name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        board:
          - uno
          - esp32dev
          - pico # Changed from rpipicow to pico

    steps:
      - uses: actions/checkout@v4

      - name: Instalar PlatformIO
        run: |
          python3 -m pip install --upgrade pip
          pip install platformio

      - name: Compilar exemplos (PlatformIO)
        run: |
          # Prevent the loop from running if the directory is empty or missing
          shopt -s nullglob  

          for example in examples/*/; do
            name=$(basename "$example")
            echo "==> A compilar exemplo: $name"
            pio ci "$example" --lib="." --board=${{ matrix.board }}
          done
